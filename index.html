<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Trafik Takip" />
  <link rel="manifest" href="manifest.webmanifest?v=7" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="stylesheet" href="styles.css?v=7" />
  <title>Trafik Takip Sistemi</title>
</head>
<body>
  <header class="topbar">
    <div>
      <p class="eyebrow">TTS</p>
      <h1>Trafik Takip Sistemi</h1>
      <p id="todayLabel" class="muted"></p>
    </div>
    <button id="installBtn" class="ghost hidden">Ana Ekrana Ekle</button>
  </header>

  <main>

    <nav class="tabs" aria-label="Ana menü">
      <button class="tab active" data-tab="record">İhbar</button>
      <button class="tab" data-tab="wanted">Aranan Araç</button>
      <button class="tab" data-tab="history">Geçmiş İhbarlar</button>
      <button class="tab" data-tab="teams">Ekipler</button>
    </nav>

    <section id="record" class="panel active">
      <h2>Yeni İhbar</h2>
      <form id="recordForm">
        <div class="address-search-wrap">
          <label>Mahalle ara
            <input id="addressSearch" type="search" autocomplete="off" placeholder="Örn. 75. Yıl, Demirtaş, Özlüce..." />
          </label>
          <div id="addressSearchResults" class="address-results hidden"></div>
        </div>

        <div class="or-divider"><span>veya ilçe–mahalle seç</span></div>

        <div class="form-grid">
          <label>İlçe
            <select id="district" required>
              <option value="Osmangazi">Osmangazi</option>
              <option value="Nilüfer">Nilüfer</option>
              <option value="Yıldırım">Yıldırım</option>
            </select>
          </label>

          <label>Mahalle
            <select id="neighborhood" required></select>
          </label>

          <label>İhbar türü
            <select id="type" required>
              <option value="Konu">Konu</option>
              <option value="Maddi Hasarlı Kaza">Maddi Hasarlı Kaza</option>
              <option value="Yaralamalı Kaza">Yaralamalı Kaza</option>
              <option value="Yakalamalı Araç">Yakalamalı Araç</option>
            </select>
          </label>

          <label>Tarih
            <input id="date" type="date" required />
          </label>

          <label>Saat
            <input id="time" type="time" required />
          </label>
        </div>

        <div class="matching-wrap">
          <div class="section-head">
            <h3>Bu mahalleye bakan ekipler</h3>
            <span id="matchingCount" class="badge">0 ekip</span>
          </div>
          <div id="matchingTeams" class="matching-teams"></div>
          <input id="selectedTeamId" type="hidden" required />
        </div>

        <label>İhbar / adres açıklaması
          <textarea id="note" rows="3" placeholder="Cadde, sokak, bina veya kısa açıklama"></textarea>
        </label>

        <button class="primary" type="submit">İhbarı Kaydet</button>
      </form>

      <div class="recent-incidents">
        <div class="section-head">
          <h2>Son 5 İhbar</h2>
          <span class="badge">Kısa görünüm</span>
        </div>
        <div id="recentIncidentList" class="compact-list"></div>
      </div>
    </section>
    <section class="stats-grid" aria-label="Bugünkü özet">
      <article class="stat"><span>Toplam Konu</span><strong id="statTotal">0</strong></article>
      <article class="stat"><span>Maddi Hasarlı</span><strong id="statMaterial">0</strong></article>
      <article class="stat"><span>Yaralamalı</span><strong id="statInjury">0</strong></article>
      <article class="stat"><span>Yakalamalı Araç</span><strong id="statWanted">0</strong></article>
    </section>

    <section id="wanted" class="panel">
      <h2>Aranan Araç Kaydı</h2>
      <form id="wantedForm">
        <div class="form-grid">
          <label>Plaka
            <input id="wantedPlate" placeholder="Örn. 16 ABC 123" required />
          </label>
          <label>Görüldüğü ilçe
            <select id="wantedDistrict" required>
              <option value="Osmangazi">Osmangazi</option>
              <option value="Nilüfer">Nilüfer</option>
              <option value="Yıldırım">Yıldırım</option>
            </select>
          </label>
          <label>Görüldüğü mahalle
            <select id="wantedNeighborhood" required></select>
          </label>
          <label>Saat
            <input id="wantedTime" type="time" required />
          </label>
        </div>
        <label>Tam adres / açıklama
          <textarea id="wantedAddress" rows="3" placeholder="Cadde, sokak, yön, araç rengi veya açıklama"></textarea>
        </label>
        <button class="primary" type="submit">Aranan Aracı Kaydet</button>
      </form>
      <div class="recent-incidents">
        <div class="section-head">
          <h2>Son Aranan Araç Kayıtları</h2>
          <span class="badge">Son 5</span>
        </div>
        <div id="wantedList" class="list"></div>
      </div>
    </section>

    <section id="history" class="panel">
      <div class="section-head">
        <h2>Geçmiş İhbarlar</h2>
        <button id="exportBtnHistory" class="ghost small">CSV İndir</button>
      </div>
      <div class="filters">
        <label>Tarih
          <input id="historyDate" type="date" />
        </label>
        <label>Ekip
          <select id="historyTeam"></select>
        </label>
      </div>
      <div id="historySummary" class="report-summary"></div>
      <div id="historyList" class="list"></div>
    </section>

<section id="teams" class="panel">
      <div class="section-head">
        <h2>Ekipler</h2>
        <button id="addTeamBtn" class="primary small">Ekip Ekle</button>
      </div>
      <div id="teamList" class="list"></div>
    </section>
  </main>

  <dialog id="teamDialog">
    <form method="dialog" id="teamForm">
      <h3>Yeni ekip</h3>
      <label>Ekip kodu
        <input id="teamCode" placeholder="Örn. 5442" required />
      </label>
      <label>İlçe
        <select id="teamDistrict" required>
          <option value="Osmangazi">Osmangazi</option>
          <option value="Nilüfer">Nilüfer</option>
          <option value="Yıldırım">Yıldırım</option>
        </select>
      </label>
      <label>Görev mahalleleri
        <input id="teamNeighborhoodSearch" type="search" placeholder="Mahalle ara..." />
      </label>
      <div class="picker-tools">
        <button type="button" class="ghost small" id="selectAllNeighborhoods">Tümünü Seç</button>
        <button type="button" class="ghost small" id="clearNeighborhoods">Temizle</button>
      </div>
      <div id="teamNeighborhoodPicker" class="neighborhood-picker"></div>
      <p id="selectedNeighborhoodCount" class="muted picker-count">0 mahalle seçildi</p>
      <div class="dialog-actions">
        <button value="cancel" class="ghost">Vazgeç</button>
        <button value="default" class="primary" id="saveTeamBtn">Kaydet</button>
      </div>
    </form>
  </dialog>

  <div id="toast" role="status" aria-live="polite"></div>

  <script src="app.js?v=7"></script>
</body>
</html>
