<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Trafik Takip" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="stylesheet" href="styles.css" />
  <title>Trafik Takip Sistemi</title>
</head>
<body>
  <header class="topbar">
    <div>
      <p class="eyebrow">TTS</p>
      <h1>Trafik Takip Sistemi</h1>
      <p id="todayLabel" class="muted"></p>
    </div>
    <button id="installBtn" class="ghost hidden">Ana Ekrana Ekle</button>
  </header>

  <main>
    <section class="stats-grid" aria-label="Bugünkü özet">
      <article class="stat"><span>Toplam Konu</span><strong id="statTotal">0</strong></article>
      <article class="stat"><span>Maddi Hasarlı</span><strong id="statMaterial">0</strong></article>
      <article class="stat"><span>Yaralamalı</span><strong id="statInjury">0</strong></article>
      <article class="stat"><span>Yakalamalı Araç</span><strong id="statWanted">0</strong></article>
    </section>

    <nav class="tabs" aria-label="Ana menü">
      <button class="tab active" data-tab="record">Yeni Kayıt</button>
      <button class="tab" data-tab="teams">Ekipler</button>
      <button class="tab" data-tab="reports">Raporlar</button>
    </nav>

    <section id="record" class="panel active">
      <h2>Yeni kayıt</h2>
      <form id="recordForm">
        <div class="form-grid">
          <label>Ekip
            <select id="teamSelect" required></select>
          </label>

          <label>Kayıt türü
            <select id="type" required>
              <option value="Konu">Konu</option>
              <option value="Maddi Hasarlı Kaza">Maddi Hasarlı Kaza</option>
              <option value="Yaralamalı Kaza">Yaralamalı Kaza</option>
              <option value="Yakalamalı Araç">Yakalamalı Araç</option>
            </select>
          </label>

          <label>Tarih
            <input id="date" type="date" required />
          </label>

          <label>Saat
            <input id="time" type="time" required />
          </label>

          <label>İlçe
            <select id="district">
              <option>Osmangazi</option>
              <option>Nilüfer</option>
              <option>Yıldırım</option>
              <option>Diğer</option>
            </select>
          </label>

          <label>Mahalle
            <input id="neighborhood" placeholder="Örn. Hüdavendigar" />
          </label>
        </div>

        <label>Açıklama
          <textarea id="note" rows="3" placeholder="Kısa açıklama veya adres bilgisi"></textarea>
        </label>

        <button class="primary" type="submit">Kaydı Ekle</button>
      </form>
    </section>

    <section id="teams" class="panel">
      <div class="section-head">
        <h2>Ekipler</h2>
        <button id="addTeamBtn" class="primary small">Ekip Ekle</button>
      </div>
      <div id="teamList" class="list"></div>
    </section>

    <section id="reports" class="panel">
      <div class="section-head">
        <h2>Raporlar</h2>
        <button id="exportBtn" class="ghost small">CSV İndir</button>
      </div>

      <div class="filters">
        <label>Tarih
          <input id="filterDate" type="date" />
        </label>
        <label>Ekip
          <select id="filterTeam"></select>
        </label>
      </div>

      <div id="reportSummary" class="report-summary"></div>
      <div id="recordList" class="list"></div>
    </section>
  </main>

  <dialog id="teamDialog">
    <form method="dialog" id="teamForm">
      <h3>Yeni ekip</h3>
      <label>Ekip kodu
        <input id="teamCode" placeholder="Örn. 5442" required />
      </label>
      <label>Görev bölgesi
        <input id="teamArea" placeholder="Örn. Nilüfer Merkez" />
      </label>
      <div class="dialog-actions">
        <button value="cancel" class="ghost">Vazgeç</button>
        <button value="default" class="primary" id="saveTeamBtn">Kaydet</button>
      </div>
    </form>
  </dialog>

  <div id="toast" role="status" aria-live="polite"></div>

  <script src="app.js"></script>
</body>
</html>
